<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试 Jellyfin 停止按钮</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .btn { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 14px; border-radius: 5px; border: none; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #logs { background: #f5f5f5; padding: 15px; border-radius: 5px; height: 400px; overflow-y: auto; margin-top: 20px; font-family: monospace; }
        .log { margin: 5px 0; padding: 3px; }
        .info { color: #2196F3; }
        .error { color: #f44336; }
        .success { color: #4CAF50; }
        .progress { color: #FF9800; }
    </style>
</head>
<body>
    <h1>Jellyfin 扫描停止按钮测试</h1>
    
    <div>
        <button id="startBtn" class="btn btn-primary" onclick="startScan()">开始扫描</button>
        <button id="stopBtn" class="btn btn-danger" onclick="stopScan()" disabled>停止扫描</button>
    </div>
    
    <div id="logs"></div>
    
    <script>
        const API = 'http://localhost:8000';
        let abortController = null;
        let isScanning = false;
        
        function addLog(type, text) {
            const logsDiv = document.getElementById('logs');
            const log = document.createElement('div');
            log.className = `log ${type}`;
            log.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            logsDiv.appendChild(log);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        async function startScan() {
            const dir = 'X:\\影视库';
            
            isScanning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            // 初始化 AbortController
            abortController = new AbortController();
            
            addLog('info', `📁 开始扫描: ${dir}`);
            addLog('info', '✅ AbortController 已初始化');
            
            try {
                const res = await fetch(`${API}/jellyfin/scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ directory: dir }),
                    signal: abortController.signal
                });
                
                addLog('info', '✅ SSE 连接已建立');
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        addLog('success', '🎉 扫描完成');
                        break;
                    }
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const evt = JSON.parse(line.slice(6));
                            handleEvent(evt);
                        } catch (e) { /* ignore */ }
                    }
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    addLog('error', '⏹ 用户取消扫描');
                } else {
                    addLog('error', `扫描失败: ${e.message}`);
                    console.error('Scan error:', e);
                }
            } finally {
                isScanning = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                abortController = null;
            }
        }
        
        function stopScan() {
            if (abortController) {
                addLog('info', '⏹ 点击停止按钮，调用 abort()...');
                abortController.abort();
                addLog('success', '✅ abort() 已调用');
            } else {
                addLog('error', '❌ AbortController 未初始化');
            }
        }
        
        function handleEvent(evt) {
            switch (evt.type) {
                case 'start':
                    addLog('info', `📁 扫描目录: ${evt.directory}`);
                    break;
                case 'progress':
                    addLog('progress', `→ 正在导入 ${evt.code} (${evt.current}/${evt.total}) - ${evt.pct}%`);
                    break;
                case 'imported':
                    addLog('success', `✅ ${evt.code} 导入成功`);
                    break;
                case 'skipped':
                    addLog('info', `⏭️ ${evt.code} ${evt.message || '已存在'}`);
                    break;
                case 'error':
                    addLog('error', `❌ ${evt.code || '未知'} 导入失败`);
                    break;
                case 'complete':
                    addLog('success', `🎉 导入完成！成功 ${evt.imported} 部，跳过 ${evt.skipped} 部`);
                    break;
            }
        }
    </script>
</body>
</html>
