[server]
host = 0.0.0.0
port = 8000

[paths]
data_dir = ../data
covers_dir = ../data/covers
frontend_dir = ../frontend
info_dir = ../info

[cors]
allow_origins = *
allow_credentials = true
allow_methods = *
allow_headers = *

[scrape]
save_cover = true
timeout = 15
default_delay = 0.5
default_retry = 1

[page]
default_page_size = 24
max_page_size = 100

[sources]
sources_json = [{"id": "fanza", "name": "Fanza", "enabled": true, "priority": 1, "url": "https://www.dmm.co.jp/mono/dvd/-/detail/=/cid={code}/", "official_url": "https://www.dmm.co.jp/", "anti_bot": false}, {"id": "avbase", "name": "Avbase", "enabled": true, "priority": 2, "url": "https://www.avbase.net/works/{code}", "official_url": "https://www.avbase.net/", "anti_bot": false}, {"id": "av-wiki", "name": "AV-Wiki", "enabled": true, "priority": 3, "url": "https://av-wiki.net/?s={code}&post_type=product", "official_url": "https://av-wiki.net/", "anti_bot": true}, {"id": "javcup", "name": "Javcup", "enabled": true, "priority": 4, "url": "https://javcup.com/search?q={code}", "official_url": "https://javcup.com/", "anti_bot": false}, {"id": "avdanyuwiki", "name": "Avdanyuwiki", "enabled": true, "priority": 5, "url": "https://avdanyuwiki.com/?s={code}", "official_url": "https://avdanyuwiki.com/", "anti_bot": false}, {"id": "javdb", "name": "JavDB", "enabled": true, "priority": 6, "url": "https://javdb.com/search?q={code}&f=all", "official_url": "https://javdb.com/", "anti_bot": true}, {"id": "javsee", "name": "JavSee", "enabled": true, "priority": 7, "url": "https://www.javsee.bond/search/{code}&type=&parent=ce", "official_url": "https://www.javsee.bond/", "anti_bot": false}, {"id": "jav321", "name": "Jav321", "enabled": true, "priority": 8, "url": "https://www.jav321.com/search?q={code}", "official_url": "https://www.jav321.com/", "anti_bot": false}, {"id": "avsox", "name": "AvSox", "enabled": false, "priority": 9, "url": "https://avsox.click/cn/search?keyword={code}", "official_url": "https://avsox.click/cn", "anti_bot": false}, {"id": "avmoo", "name": "AvMoo", "enabled": false, "priority": 10, "url": "https://avmoo.shop/cn/search/{code}", "official_url": "https://avmoo.shop/cn", "anti_bot": false}]

