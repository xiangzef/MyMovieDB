[server]
host = 0.0.0.0
port = 8000

[paths]
data_dir = ../data
covers_dir = ../data/covers
frontend_dir = ../frontend
info_dir = ../info

[cors]
allow_origins = *
allow_credentials = true
allow_methods = *
allow_headers = *

[scrape]
save_cover = true
timeout = 30
default_delay = 1.0
default_retry = 2

[page]
default_page_size = 20
max_page_size = 100

# ============================================================
# 爬虫数据源配置
# enabled: true=启用 false=禁用
# priority: 数字越小越优先
# anti_bot: true=有反爬，延迟加倍
# ============================================================
[sources]
# JSON 数组（单行），id 对应 scraper.py 中的爬虫类映射键
sources_json = [{"id":"fanza","name":"Fanza","enabled":true,"priority":1,"url":"https://www.dmm.co.jp/mono/dvd/-/detail/=/cid={code}/","anti_bot":false},{"id":"avbase","name":"Avbase","enabled":true,"priority":2,"url":"https://www.avbase.net/works?q={code}","anti_bot":false},{"id":"av-wiki","name":"AV-Wiki","enabled":true,"priority":3,"url":"https://av-wiki.net/?s={code}&post_type=product","anti_bot":true},{"id":"javcup","name":"Javcup","enabled":true,"priority":4,"url":"https://javcup.com/search?q={code}","anti_bot":false},{"id":"avdanyuwiki","name":"Avdanyuwiki","enabled":true,"priority":5,"url":"https://avdanyuwiki.com/?s={code}","anti_bot":false}]
