[server]
host = 0.0.0.0
port = 8000

[paths]
# 相对于 backend/ 目录的路径
data_dir = ../data
covers_dir = ../data/covers
frontend_dir = ../frontend
info_dir = ../info

[cors]
allow_origins = *
allow_credentials = true
allow_methods = *
allow_headers = *

[scrape]
# 默认刮削选项
save_cover = true
timeout = 30

[page]
# 前端分页默认配置
default_page_size = 20
max_page_size = 100
