<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMovieDB - 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .register-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .register-header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .captcha-row {
            display: flex;
            gap: 12px;
        }
        .captcha-row input {
            flex: 1;
        }
        .captcha-img {
            width: 120px;
            height: 48px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #667eea;
            cursor: pointer;
            user-select: none;
            border: 2px solid #e0e0e0;
        }
        .captcha-img:hover {
            border-color: #667eea;
        }
        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-register:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .register-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        .register-footer a {
            color: #667eea;
            text-decoration: none;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-msg {
            background: #fee;
            color: #c33;
        }
        .success-msg {
            background: #efe;
            color: #3c3;
        }
        .error-msg.show, .success-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>注册账户</h1>
            <p>创建您的 MyMovieDB 账户</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名（3-20字符）" required minlength="3" maxlength="20">
            </div>

            <div class="form-group">
                <label>邮箱（可选）</label>
                <input type="email" id="email" placeholder="请输入邮箱地址">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码（至少6位）" required minlength="6">
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="passwordConfirm" placeholder="请再次输入密码" required>
            </div>

            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-row">
                    <input type="text" id="captcha" placeholder="请输入验证码" required>
                    <div class="captcha-img" id="captchaImg" title="点击刷新"></div>
                </div>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">注册</button>
        </form>

        <div class="register-footer">
            已有账户？<a href="/login.html">立即登录</a>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let captchaCode = '';

        // 生成验证码
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            captchaCode = '';
            for (let i = 0; i < 4; i++) {
                captchaCode += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById('captchaImg').textContent = captchaCode;
        }

        // 初始化验证码
        generateCaptcha();
        document.getElementById('captchaImg').addEventListener('click', generateCaptcha);

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const captcha = document.getElementById('captcha').value.toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const registerBtn = document.getElementById('registerBtn');

            // 验证码检查
            if (captcha !== captchaCode) {
                errorMsg.textContent = '验证码错误';
                errorMsg.classList.add('show');
                successMsg.classList.remove('show');
                generateCaptcha();
                return;
            }

            // 密码确认检查
            if (password !== passwordConfirm) {
                errorMsg.textContent = '两次输入的密码不一致';
                errorMsg.classList.add('show');
                successMsg.classList.remove('show');
                return;
            }

            // 禁用按钮
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';

            try {
                const response = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });

                const data = await response.json();

                if (response.ok) {
                    errorMsg.classList.remove('show');
                    successMsg.textContent = '注册成功！3秒后跳转到登录页...';
                    successMsg.classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    errorMsg.textContent = data.detail || '注册失败';
                    errorMsg.classList.add('show');
                    successMsg.classList.remove('show');
                    generateCaptcha();
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
                successMsg.classList.remove('show');
                generateCaptcha();
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
