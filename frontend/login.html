<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMovieDB - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .captcha-row {
            display: flex;
            gap: 12px;
        }
        .captcha-row input {
            flex: 1;
        }
        .captcha-img {
            width: 120px;
            height: 48px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #667eea;
            cursor: pointer;
            user-select: none;
            border: 2px solid #e0e0e0;
        }
        .captcha-img:hover {
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .login-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        .login-footer a {
            color: #667eea;
            text-decoration: none;
            margin: 0 8px;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎬 MyMovieDB</h1>
            <p>本地影视库管理系统</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>账户</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>

            <!-- 暂时隐藏验证码
            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-row">
                    <input type="text" id="captcha" placeholder="请输入验证码" required>
                    <div class="captcha-img" id="captchaImg" title="点击刷新"></div>
                </div>
            </div>
            -->

            <button type="submit" class="btn-login" id="loginBtn">登录</button>
        </form>

        <div class="login-footer">
            <a href="#" id="registerLink">注册账户</a>
            <a href="#" id="forgotLink">忘记密码</a>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        // let captchaCode = '';

        // 暂时隐藏验证码生成
        /*
        // 生成验证码
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            captchaCode = '';
            for (let i = 0; i < 4; i++) {
                captchaCode += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById('captchaImg').textContent = captchaCode;
        }

        // 初始化验证码
        generateCaptcha();
        document.getElementById('captchaImg').addEventListener('click', generateCaptcha);
        */

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            // const captcha = document.getElementById('captcha').value.toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            // 暂时隐藏验证码检查
            /*
            // 验证码检查
            if (captcha !== captchaCode) {
                errorMsg.textContent = '验证码错误';
                errorMsg.classList.add('show');
                generateCaptcha();
                return;
            }
            */

            // 禁用按钮
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 保存 token 和用户信息
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // 跳转到主页
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || '登录失败';
                    errorMsg.classList.add('show');
                    generateCaptcha();
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
                generateCaptcha();
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

        // 注册链接
        document.getElementById('registerLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/register.html';
        });

        // 忘记密码（暂未实现）
        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('密码找回功能暂未开放，请联系管理员');
        });
    </script>
</body>
</html>
