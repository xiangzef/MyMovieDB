<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Vue CDN 测试</title>
</head>
<body style="background:#1a1a2e;color:#eee;font-family:monospace;padding:40px;">
    <div id="app">
        <p>loading...</p>
    </div>
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.4.27/vue.global.prod.min.js?v=20260401"></script>
    <script>
        document.getElementById('app').innerHTML = '<p style="color:#0f0;">✅ Vue 已加载，版本: ' + Vue.version + '</p>';
        Vue.createApp({
            setup() {
                const msg = Vue.ref('✅ Vue 正常工作了！');
                return { msg };
            },
            template: '<p style="color:#0f0;">{{ msg }}</p>'
        }).mount('#app');
    </script>
</body>
</html>
